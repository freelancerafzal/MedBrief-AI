<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI — Professional Clinical Intelligence Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0d9488; --border: #e2e8f0; --bg-main: #f8fafc; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-main); display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 320px; padding: 2rem; border-right: 1px solid var(--border); background: white; }
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-history { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { padding: 1rem; border-radius: 8px; border: 1px solid var(--border); background: white; max-width: 80%; }
        .user { align-self: flex-end; background: #e0f2fe; }
        .chat-input { padding: 1.5rem; border-top: 1px solid var(--border); background: white; display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">MedBrief AI</h2>
        <input type="password" id="api-key" placeholder="Paste API Key (AIzaSy...)" style="width:100%; padding: 0.5rem; margin-bottom: 1rem;">
        <div style="border: 2px dashed var(--border); padding: 1rem; text-align: center;">
            <input type="file" id="file-input" accept="application/pdf,image/*">
        </div>
        <div id="status" style="margin-top: 1rem; font-weight: 600; color: #475569;">System Ready</div>
    </div>
    <div class="main-panel">
        <div id="chat-history"></div>
        <div class="chat-input">
            <input type="text" id="user-input" style="flex:1; padding: 0.8rem;" placeholder="Ask clinical questions...">
            <button id="send-btn" style="padding: 0.8rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 4px;">Send</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        
        let ai = null;
        let chatSession = null;
        let currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => {
            ai = new GoogleGenAI({ apiKey: e.target.value });
        });

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                currentDocumentContext = { inlineData: { data: base64, mimeType: file.type } };
                document.getElementById('status').innerText = "Analyzing...";
                
                chatSession = ai.chats.create({ model: 'gemini-2.5-flash' });
                
                // FIXED: Strict multimodal array structure
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Analyze this document and extract findings." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
                document.getElementById('status').innerText = "Analysis Complete";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            if (!input.value || !chatSession) return;
            
            appendMsg('User', input.value);
            
            // FIXED: Persistent context injection
            const payload = currentDocumentContext 
                ? { message: [{ text: input.value }, currentDocumentContext] }
                : { message: input.value };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> ${marked.parse(text)}`;
            document.getElementById('chat-history').appendChild(div);
        }
    </script>
</body>
</html>
