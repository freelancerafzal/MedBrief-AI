<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI | Professional Clinical Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --accent: #14b8a6; 
            --bg-deep: #0f172a; 
            --bg-panel: #ffffff;
            --text-sub: #64748b;
        }
        body { font-family: 'Inter', system-ui; background: #f1f5f9; display: flex; height: 100vh; margin: 0; }
        
        /* Sidebar Styling */
        .sidebar { width: 340px; background: var(--bg-deep); color: white; padding: 2rem; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--accent); margin-bottom: 2rem; }
        
        /* Main Panel Styling */
        .main-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        #chat-history { flex: 1; overflow-y: auto; padding: 2.5rem; }
        
        /* Message Bubbles */
        .message { padding: 1.2rem; border-radius: 12px; margin-bottom: 1.5rem; line-height: 1.6; border-left: 4px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .user { background: #f0fdfa; border-left-color: #cbd5e1; align-self: flex-end; }
        .ai { background: #ffffff; }
        
        /* Input Area */
        .input-area { padding: 2rem; border-top: 1px solid #e2e8f0; display: flex; gap: 1rem; }
        input[type="text"] { flex: 1; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MedBrief AI</h2>
        <input type="password" id="api-key" placeholder="Enter API Key..." style="padding:0.8rem; border-radius:4px; border:none; margin-bottom:1rem;">
        <input type="file" id="file-input" accept="application/pdf,image/*" style="margin-top:1rem;">
        <div id="status" style="margin-top:2rem; font-size:0.9rem; opacity:0.8;">System Status: Ready</div>
    </div>
    <div class="main-panel">
        <div id="chat-history"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Clinical questions, symptom analysis, or report summaries...">
            <button id="send-btn">Process</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        let ai = null, chatSession = null, currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => ai = new GoogleGenAI({ apiKey: e.target.value }));

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                currentDocumentContext = { inlineData: { data: event.target.result.split(',')[1], mimeType: file.type } };
                document.getElementById('status').innerText = "Status: Parsing Record...";
                
                chatSession = ai.chats.create({ model: 'gemini-2.5-flash' });
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Perform clinical extraction." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
                document.getElementById('status').innerText = "Status: Analysis Complete";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            if (!input.value || !chatSession) return;
            appendMsg('User', input.value);
            
            // Re-injection of context fixes the "document not provided" error
            const payload = currentDocumentContext 
                ? { message: [{ text: input.value }, currentDocumentContext] }
                : { message: input.value };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> ${marked.parse(text)}`;
            document.getElementById('chat-history').appendChild(div);
        }
    </script>
</body>
</html>
