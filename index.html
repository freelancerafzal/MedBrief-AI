<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI | Aspira Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Importing Aspira-like modern geometric font */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root { 
            --deep-blue: #0f172a; 
            --neon-teal: #14b8a6; 
            --bg-main: #f8fafc;
        }

        body { 
            font-family: 'Outfit', sans-serif; /* Aspira-like geometric clarity */
            background: var(--bg-main); 
            display: flex; 
            height: 100vh; 
            margin: 0; 
        }
        
        .sidebar { 
            width: 320px; 
            background: var(--deep-blue); 
            color: white; 
            padding: 2.5rem; 
            display: flex; 
            flex-direction: column; 
        }

        h2 { color: var(--neon-teal); letter-spacing: -0.02em; }

        .main-panel { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-history { flex: 1; overflow-y: auto; padding: 2rem; }
        
        /* Message styling refined for clarity */
        .message { 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin-bottom: 1.5rem; 
            border-left: 4px solid var(--neon-teal);
            background: #fdfdfd;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        input[type="text"], input[type="password"] { 
            font-family: 'Outfit', sans-serif; 
            font-size: 1rem;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        button { 
            font-family: 'Outfit', sans-serif;
            background: var(--neon-teal); 
            color: white; 
            border: none; 
            padding: 1rem 2rem; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>MedBrief AI</h2>
        <input type="password" id="api-key" placeholder="Enter API Key...">
        <input type="file" id="file-input" accept="application/pdf,image/*" style="margin-top:2rem;">
        <div id="status" style="margin-top:2rem; color:var(--neon-teal);">System Ready</div>
    </div>
    <div class="main-panel">
        <div id="chat-history"></div>
        <div style="padding: 2rem; border-top: 1px solid #e2e8f0; display:flex; gap:1rem;">
            <input type="text" id="user-input" style="flex:1" placeholder="Type clinical inquiry...">
            <button id="send-btn">Process</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        let ai = null, chatSession = null, currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => ai = new GoogleGenAI({ apiKey: e.target.value }));

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                currentDocumentContext = { inlineData: { data: event.target.result.split(',')[1], mimeType: file.type } };
                chatSession = ai.chats.create({ model: 'gemini-2.5-flash' });
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Analyze this report." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            if (!input.value || !chatSession) return;
            appendMsg('User', input.value);
            
            // Re-injection of document context ensures AI memory
            const payload = currentDocumentContext 
                ? { message: [{ text: input.value }, currentDocumentContext] }
                : { message: input.value };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> ${marked.parse(text)}`;
            document.getElementById('chat-history').appendChild(div);
            document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        }
    </script>
</body>
</html>
