<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI | Clinical Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;600&display=swap');
        :root { --paper: #ECE5D3; --card: #F6F2E9; --ink: #20262E; --clinical-blue: #1B4965; --border: #D8CFB8; }
        
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--paper); color: var(--ink); margin: 0; display: flex; height: 100vh; }
        
        /* Requisition Slip Sidebar */
        .sidebar { width: 320px; padding: 2rem; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--card); }
        .brand-name { font-family: 'IBM Plex Mono'; font-size: 1.2rem; font-weight: 600; border-bottom: 2px solid var(--ink); padding-bottom: 1rem; margin-bottom: 2rem; color: var(--clinical-blue); }
        
        .form-field { margin-bottom: 1.5rem; }
        .form-field label { display: block; font-family: 'IBM Plex Mono'; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 0.3rem; }
        .form-field input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 0.4rem 0; outline: none; }
        .form-field input:focus { outline: 2px solid var(--clinical-blue); border-radius: 4px; }

        /* Main Workspace */
        .main-panel { flex: 1; display: flex; flex-direction: column; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 28px 28px; }
        #chat-history { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; }

        .message { background: #FFFFFF; padding: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid var(--clinical-blue); border-radius: 0 8px 8px 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); max-width: 80%; }
        .user { align-self: flex-end; background: var(--clinical-blue); color: white; border-radius: 8px 0 8px 8px; border-left: none; }

        button { background: var(--ink); color: white; font-family: 'IBM Plex Mono'; font-size: 0.7rem; padding: 0.8rem; border: none; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: 0.2s; }
        button:hover { background: var(--clinical-blue); }
        
        #status { font-family: 'IBM Plex Mono'; font-size: 0.7rem; border: 1px dashed var(--ink); padding: 1rem; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand-name">MEDBRIEF AI</div>
        <div class="form-field">
            <label>API KEY</label>
            <input type="password" id="api-key" placeholder="AIza...">
        </div>
        <div class="form-field">
            <label>REPORT UPLOAD</label>
            <input type="file" id="file-input" accept="application/pdf,image/*">
        </div>
        <div id="status">READY FOR ANALYSIS</div>
    </div>
    <div class="main-panel">
        <div id="chat-history"></div>
        <div style="padding: 2rem; display:flex; gap:1rem;">
            <input type="text" id="user-input" style="flex:1; background:var(--card); border:1px solid var(--border); padding:1rem; border-radius:8px;" placeholder="Ask clinical questions...">
            <button id="send-btn">Process</button>
        </div>
    </div>

    <script type="importmap"> { "imports": { "@google/genai": "https://esm.run/@google/genai" } } </script>
    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        let ai = null, chatSession = null, currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => ai = new GoogleGenAI({ apiKey: e.target.value }));

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            const status = document.getElementById('status');
            
            reader.onload = async (event) => {
                currentDocumentContext = { inlineData: { data: event.target.result.split(',')[1], mimeType: file.type } };
                status.innerText = "PARSING DATA...";
                
                chatSession = ai.chats.create({ 
                    model: 'gemini-2.5-flash',
                    config: { systemInstruction: "You are MedBrief AI, a clinical assistant." } 
                });
                
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Analyze this clinical report." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
                status.innerText = "ANALYSIS COMPLETE";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            if (!input.value || !chatSession) return;
            appendMsg('User', input.value);
            
            // Re-injection of context fixes "document not provided" errors
            const payload = currentDocumentContext 
                ? { message: [{ text: input.value }, currentDocumentContext] }
                : { message: input.value };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const chat = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender.toUpperCase()}</strong><br>${marked.parse(text)}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
