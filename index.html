<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI Clinical Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0d9488; --border: #e2e8f0; }
        body { font-family: system-ui; display: flex; height: 100vh; margin: 0; background: #f8fafc; }
        .sidebar { width: 320px; padding: 1.5rem; border-right: 1px solid var(--border); background: white; }
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-history { flex: 1; overflow-y: auto; padding: 2rem; }
        .chat-input-area { padding: 1.5rem; border-top: 1px solid var(--border); background: white; }
        .message { padding: 1rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--border); background: white; }
        .user { background: #e0f2fe; align-self: flex-end; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>MedBrief AI</h3>
        <input type="password" id="api-key" placeholder="Enter Gemini API Key" style="width:100%; margin-bottom: 1rem;">
        <input type="file" id="file-input" accept="application/pdf,image/*">
        <div id="status" style="margin-top: 1rem; font-weight: bold; color: var(--primary);">System Ready</div>
    </div>
    <div class="main-panel">
        <div id="chat-history"></div>
        <div class="chat-input-area">
            <input type="text" id="user-input" style="width: 80%; padding: 0.5rem;" placeholder="Ask about your report...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        
        let ai = null;
        let chatSession = null;
        let currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => {
            ai = new GoogleGenAI({ apiKey: e.target.value });
        });

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                currentDocumentContext = { inlineData: { data: base64, mimeType: file.type } };
                
                document.getElementById('status').innerText = "Analyzing document...";
                
                chatSession = ai.chats.create({ 
                    model: 'gemini-2.5-flash',
                    config: { systemInstruction: "You are a clinical expert. Analyze the provided report." }
                });
                
                // Fixed structure for multimodal input
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Please extract values and summarize this report." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
                document.getElementById('status').innerText = "Analysis Complete";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            const query = input.value;
            if (!query || !chatSession) return;
            
            appendMsg('User', query);
            
            // CRITICAL FIX: Re-inject document context into every follow-up message
            const payload = { 
                message: currentDocumentContext 
                    ? [{ text: query }, currentDocumentContext] 
                    : query 
            };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> ${marked.parse(text)}`;
            document.getElementById('chat-history').appendChild(div);
        }
    </script>
</body>
</html>
