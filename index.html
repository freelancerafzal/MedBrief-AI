<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedBrief AI Clinical Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0d9488; --border: #e2e8f0; }
        body { font-family: system-ui; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; padding: 1rem; border-right: 1px solid var(--border); }
        .main-panel { flex: 1; display: flex; flex-direction: column; }
        #chat-history { flex: 1; overflow-y: auto; padding: 1rem; background: #fafafa; }
        .chat-input { padding: 1rem; display: flex; gap: 0.5rem; }
        .message { padding: 0.8rem; margin-bottom: 0.5rem; border-radius: 8px; border: 1px solid var(--border); }
        .user { align-self: flex-end; background: #e0f2fe; }
    </style>
</head>
<body>
    <header>
        <strong>MedBrief AI</strong>
        <input type="password" id="api-key" placeholder="Paste API Key...">
    </header>
    <div class="workspace">
        <div class="sidebar">
            <h3>Upload Record</h3>
            <input type="file" id="file-input" accept="application/pdf,image/*">
            <div id="status">System Ready</div>
        </div>
        <div class="main-panel">
            <div id="chat-history"></div>
            <div class="chat-input">
                <input type="text" id="user-input" style="flex:1" placeholder="Ask about your report...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        
        let ai = null;
        let chatSession = null;
        let currentDocumentContext = null;

        document.getElementById('api-key').addEventListener('change', (e) => {
            ai = new GoogleGenAI({ apiKey: e.target.value });
        });

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                currentDocumentContext = { inlineData: { data: base64, mimeType: file.type } };
                
                chatSession = ai.chats.create({ 
                    model: 'gemini-2.5-flash',
                    config: { systemInstruction: "You are a clinical analysis assistant." }
                });
                
                const response = await chatSession.sendMessage({ 
                    message: [{ text: "Analyze this document." }, currentDocumentContext] 
                });
                appendMsg('AI', response.text);
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            const query = input.value;
            appendMsg('User', query);
            
            // CRITICAL FIX: Re-inject the document context if it exists
            const payload = currentDocumentContext 
                ? { message: [{ text: query }, currentDocumentContext] }
                : { message: query };
                
            const response = await chatSession.sendMessage(payload);
            appendMsg('AI', response.text);
            input.value = '';
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> ${marked.parse(text)}`;
            document.getElementById('chat-history').appendChild(div);
        }
    </script>
</body>
</html>
