<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBrief AI — Professional Clinical Intelligence Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --primary-light: #f0fdfa;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --chat-user: #e0f2fe;
            --chat-ai: #ffffff;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-card);
            padding: 0.85rem 2rem;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
        }

        header h1 span {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mode-badge {
            font-size: 0.8rem;
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            background-color: #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .mode-badge.active-doc {
            background-color: #ecfdf5;
            color: #065f46;
            border-color: #a7f3d0;
        }

        .key-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #334155;
        }

        .key-btn:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .key-status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
        }

        .key-status-dot.valid {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Dashboard Workspace Design split into Sidebar + Workspace */
        .app-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Medical Record Control Sidebar */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--border);
            background-color: #ffffff;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .sidebar-section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 700;
        }

        .upload-section {
            background: var(--bg-main);
            padding: 1.5rem 1rem;
            border-radius: 8px;
            border: 2px dashed #cbd5e1;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .upload-section.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-btn {
            background-color: var(--primary);
            color: white;
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        #file-input { display: none; }

        .active-file-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            background-color: var(--bg-main);
            display: none;
        }

        .active-file-card.show {
            display: block;
        }

        .file-name-text {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            word-break: break-all;
            margin-bottom: 0.25rem;
        }

        /* Main Dialogue Console Layout */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #ffffff;
        }

        .chat-history {
            flex: 1;
            padding: 1.5rem 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background-color: #fafafa;
        }

        .message {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--chat-user);
            color: #0c4a6e;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--chat-ai);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        /* Markdown elements formatting layout for AI responses */
        .message.ai table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
            font-size: 0.9rem;
        }
        .message.ai th, .message.ai td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .message.ai th { background-color: #f1f5f9; font-weight: 600; }
        .message.ai ul, .message.ai ol { margin-left: 1.25rem; margin-top: 0.5rem; }
        .message.ai h3 { margin-top: 0.75rem; color: #0f172a; font-size: 1.1rem; }

        .message.system {
            align-self: center;
            background-color: #fffbeb;
            color: #78350f;
            border: 1px solid #fde68a;
            font-size: 0.85rem;
            text-align: center;
            border-radius: 8px;
        }

        .interactive-suggestions {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            flex-wrap: wrap;
