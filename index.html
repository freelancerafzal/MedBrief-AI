<script type="module">
    import { GoogleGenAI } from '@google/genai';

    let API_KEY = localStorage.getItem('medbrief_gemini_key') || "";
    let ai = API_KEY ? new GoogleGenAI({ apiKey: API_KEY }) : null;
    let currentDocumentContext = null; 
    let chatSession = null;
    let activeMode = "symptom"; 

    const DOCUMENT_SYSTEM_INSTRUCTION = "You are a healthcare document analysis assistant specializing in blood test reports and medical prescriptions. Extract all key values into structured markdown tables, clearly flag out-of-range abnormalities, and explain medical terms simply. Answer questions based only on the uploaded document.";
    const GENERAL_SYMPTOM_INSTRUCTION = "You are an expert clinical medical intelligence engine. When provided with patient symptoms, map them onto potential underlying medical conditions using markdown lists and tables. Clearly outline structural risk profiles, specify whether clinical triage is recommended, and explain medical concepts cleanly. Always add a mandatory disclaimer that this does not replace professional medical opinions.";

    // UI Link Nodes
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const uploadStatus = document.getElementById('upload-status');
    const fileCard = document.getElementById('file-card');
    const activeFileName = document.getElementById('active-file-name');
    const chatHistory = document.getElementById('chat-history');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const appModeBadge = document.getElementById('app-mode');
    const suggestionsRow = document.getElementById('suggestions-row');
    
    const settingsModal = document.getElementById('settings-modal');
    const openSettingsBtn = document.getElementById('open-settings-btn');
    const closeSettingsBtn = document.getElementById('close-settings-btn');
    const saveKeyBtn = document.getElementById('save-key-btn');
    const apiKeyInput = document.getElementById('api-key-input');
    const keyDot = document.getElementById('key-dot');

    const suggestionsMap = {
        symptom: [
            { label: "Analyze Symptoms", text: "Analyze potential causes for persistent dry cough, mild fever, and fatigue for 3 days." },
            { label: "Glucose Variations", text: "Check general physiological indicators and risk factors for High Blood Sugar." },
            { label: "Lipid Panels", text: "Explain general guidelines for optimal lipid cholesterol ranges." }
        ],
        document: [
            { label: "Summarize Report", text: "Provide a structured breakdown of all out-of-range abnormalities from this document." },
            { label: "Flag High Risks", text: "What are the most critical risk vectors highlighted in this report?" },
            { label: "Next Step Action plan", text: "What specific medical consultation actions or clear metrics should be pursued next?" }
        ]
    };

    window.applySuggestion = function(text) {
        chatInput.value = text;
        chatInput.focus();
    };

    function populateSuggestions() {
        suggestionsRow.innerHTML = "";
        const currentChips = suggestionsMap[activeMode];
        currentChips.forEach(chip => {
            const btn = document.createElement('button');
            btn.className = "suggestion-chip";
            btn.innerText = chip.label;
            btn.addEventListener('click', () => applySuggestion(chip.text));
            suggestionsRow.appendChild(btn);
        });
    }

    // Initialize Workspace Defaults
    updateKeyStatusUI();
    populateSuggestions();

    // Bind Gateway Interaction Elements
    if (openSettingsBtn) {
        openSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = API_KEY;
            settingsModal.classList.add('open');
        });
    }
    if (closeSettingsBtn) {
        closeSettingsBtn.addEventListener('click', () => settingsModal.classList.remove('open'));
    }
    if (saveKeyBtn) {
        saveKeyBtn.addEventListener('click', () => {
            const incomingKey = apiKeyInput.value.trim();
            if (incomingKey) {
                localStorage.setItem('medbrief_gemini_key', incomingKey);
                API_KEY = incomingKey;
                ai = new GoogleGenAI({ apiKey: API_KEY });
                appendMessage('system', 'Clinical API network connection successfully updated.');
            } else {
                localStorage.removeItem('medbrief_gemini_key');
                API_KEY = "";
                ai = null;
                appendMessage('system', 'Credentials unlinked.');
            }
            updateKeyStatusUI();
            settingsModal.classList.remove('open');
        });
    }

    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    sendBtn.addEventListener('click', handleSendMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });

    function updateKeyStatusUI() {
        if (API_KEY) keyDot.classList.add('valid');
        else keyDot.classList.remove('valid');
    }

    function handleFile(file) {
        if (!file) return;
        
        // Dynamic detection supporting both PDF and image uploads natively
        let mimeType = file.type;
        if (mimeType !== 'application/pdf' && !mimeType.startsWith('image/')) {
            alert('Please upload a valid healthcare PDF or report image file.');
            return;
        }

        activeMode = "document";
        appModeBadge.textContent = "Document Analysis Active";
        appModeBadge.classList.add('active-doc');
        
        fileCard.classList.add('show');
        activeFileName.innerText = file.name;
        populateSuggestions();

        const reader = new FileReader();
        reader.onload = async function() {
            const base64Data = reader.result.split(',')[1];
            currentDocumentContext = {
                inlineData: {
                    data: base64Data,
                    mimeType: mimeType
                }
            };
            await analyzeDocument();
        };
        reader.readAsDataURL(file);
    }

    async function analyzeDocument() {
        if (!checkApiKeyValidity()) return;

        uploadStatus.innerHTML = `<span class="spinner"></span> Extracting data...`;
        appendMessage('system', 'Analyzing health record data vectors via secure stream context...');

        try {
            // Instantiate the clean chat session container
            chatSession = ai.chats.create({
                model: 'gemini-2.5-flash',
                config: { systemInstruction: DOCUMENT_SYSTEM_INSTRUCTION }
            });

            // Clean direct structural object array formatting built for GoogleGenAI SDK specs
            const response = await chatSession.sendMessage({
                message: [
                    currentDocumentContext,
                    "Please perform an initial extraction, structural value cataloging, and flag abnormalities."
                ]
            });

            uploadStatus.innerHTML = "✅ Processing complete.";
            appendMarkdownMessage('ai', response.text);
        } catch (error) {
            console.error("Pipeline Debug log:", error);
            uploadStatus.innerHTML = "❌ Pipeline processing error.";
            appendMessage('system', 'Could not parse document data vectors securely. Ensure your API Key contains correct permission scopes for file parsing.');
        }
    }

    async function handleSendMessage() {
        const query = chatInput.value.trim();
        if (!query) return;

        if (!checkApiKeyValidity()) return;

        appendMessage('user', query);
        chatInput.value = '';

        chatInput.disabled = true;
        sendBtn.disabled = true;

        try {
            if (activeMode === "document" && chatSession) {
                const response = await chatSession.sendMessage({ message: query });
                appendMarkdownMessage('ai', response.text);
            } else {
                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: query,
                    config: { systemInstruction: GENERAL_SYMPTOM_INSTRUCTION }
                });
                appendMarkdownMessage('ai', response.text);
            }
        } catch (error) {
            console.error(error);
            appendMessage('system', 'Error calculating workspace intelligence parameters.');
        } finally {
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    function checkApiKeyValidity() {
        if (!API_KEY) {
            settingsModal.classList.add('open');
            appendMessage('system', 'Access configuration required: Open API Gateway.');
            return false;
        }
        return true;
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function appendMarkdownMessage(sender, markdownText) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerHTML = window.marked ? window.marked.parse(markdownText) : markdownText;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>
